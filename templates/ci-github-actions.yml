# AutoReview CI template — drop into .github/workflows/autoreview.yml in your repo.
# Runs the reviewer over uncommitted diffs on every PR. Exit 1 on rule reject = PR fails.
#
# Provider: default here is Ollama. Swap to a paid provider by replacing the Ollama steps
# with an API-key secret and `ollama` is not needed. If you use Anthropic/OpenAI/Google,
# skip the ollama install/pull/serve steps and set the relevant *_API_KEY secret on your
# workflow. Cost scales with the number of PR files that match triggers × matched rules.
#
# To review a full PR (not just changed files), use `--scope all` — expensive on large repos.

name: autoreview

on:
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # AutoReview walks git history for --scope uncommitted/--sha

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache the Ollama model so subsequent PR runs skip the multi-GB pull.
      # Bump the key when you want a clean re-download (e.g. model upgrade).
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-7b-v1

      - name: Install Ollama (local reviewer — free, no API key needed)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 3
          ollama pull qwen2.5-coder:7b

      - name: Pull remote rule sources
        # Skip the step entirely if your repo has no `remote_rules:` in .autoreview/config.yaml.
        # `pull-remote` is a no-op when the config declares no sources, so it's safe to always run.
        run: node .autoreview/runtime/bin/pull-remote.mjs

      - name: Review PR files under hard enforcement
        # `--context validate` is hard by default → exit 1 on reject → PR fails.
        # Swap scope to --scope all for a whole-repo sweep.
        run: node .autoreview/runtime/bin/validate.mjs --scope uncommitted --mode thinking

      # Paid provider alternative (comment out the ollama + cache steps above and use this instead):
      # - name: Review PR files
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: node .autoreview/runtime/bin/validate.mjs --scope uncommitted --mode thinking
