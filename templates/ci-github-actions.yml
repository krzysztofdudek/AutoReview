# AutoReview CI template — drop into .github/workflows/autoreview.yml in your repo.
# Runs the reviewer over PR diffs on every pull request. Exit 1 on rule reject = PR fails.
#
# Why we clone AutoReview in CI:
#   `/autoreview:init` installs a runtime copy at .autoreview/runtime/ on the developer's
#   machine so pre-commit hooks work without Claude Code running. That runtime is
#   gitignored — it's a mirror of the plugin source, not meant to be committed. So CI
#   can't rely on it being in your repo checkout. Instead we clone AutoReview directly
#   and invoke the reviewer from there.
#
# Provider: default is Ollama (local, free). Swap the Ollama install/pull/serve steps
# for an API-key secret if you want Anthropic/OpenAI/Google (see the commented block
# at the bottom). Cost scales with matched-files × matched-rules.
#
# Caveat: AutoReview's fail-open invariant (spec §22) means provider outages (Ollama
# crashed, API unreachable, malformed response) produce [error] lines that DO NOT fail
# the job. Only actual rule rejects exit 1. If you need the job to fail when the
# reviewer itself is broken, add a grep step that counts [error] lines and fails if > 0.
#
# To review a full PR (not just changed files), use --scope all — expensive on large repos.

name: autoreview

on:
  pull_request:
    branches: [main]

env:
  # Match this to the AutoReview version your team uses. Bump in lockstep with
  # `/plugin install autoreview@<ref>` on your developer machines.
  AUTOREVIEW_REF: main

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout product repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # AutoReview walks git history for --scope uncommitted/--sha

      - name: Checkout AutoReview runtime
        # Cloned to /tmp/autoreview. NOT into the product repo. The user's .autoreview/
        # (rules + config) lives at $GITHUB_WORKSPACE/.autoreview/ as usual.
        run: |
          git clone --depth 1 --branch ${{ env.AUTOREVIEW_REF }} \
            https://github.com/krzysztofdudek/AutoReview /tmp/autoreview

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Cache the Ollama model so subsequent PR runs skip the multi-GB pull.
      # Bump the key when you want a clean re-download (e.g. model upgrade).
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-7b-v1

      - name: Install Ollama (local reviewer — free, no API key needed)
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 3
          ollama pull qwen2.5-coder:7b

      - name: Pull remote rule sources
        # No-op when the product repo has no `remote_rules:` configured — safe to always run.
        run: node /tmp/autoreview/scripts/bin/pull-remote.mjs

      - name: Review PR files under hard enforcement
        # `--context validate` is hard by default → exit 1 on rule reject → PR fails.
        # Swap scope to --scope all for a whole-repo sweep.
        run: node /tmp/autoreview/scripts/bin/validate.mjs --scope uncommitted --mode thinking

      # Paid provider alternative: replace the Ollama install/pull/serve steps with:
      # - name: Review PR files
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: node /tmp/autoreview/scripts/bin/validate.mjs --scope uncommitted --mode thinking
      # Remove `AUTOREVIEW_REF` env + the Ollama cache + install steps if going paid-only.
