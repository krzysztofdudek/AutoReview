version: "0.1"

provider:
  active: ollama
  # Optional `parallel: <int>` per provider caps concurrent in-flight LLM calls. Defaults
  # are filled in at load time when omitted: ollama 1 (single GPU thrashes under concurrency),
  # openai-compat 5 (LM Studio / vLLM batched servers), anthropic/openai/google 10 (paid APIs
  # with generous RPM tiers — free-tier OpenAI users at 4 RPM should drop to 2–3 manually),
  # claude-code/codex/gemini-cli 3 (CLI subprocess startup overhead caps useful concurrency).
  # 429/408 responses retry with exponential backoff up to 4 attempts honouring Retry-After.
  ollama:        { endpoint: "http://localhost:11434", model: "qwen2.5-coder:7b", parallel: 1 }
  claude-code:   { model: haiku, parallel: 3 }
  codex:         { model: "gpt-5", parallel: 3 }
  gemini-cli:    { model: "gemini-2.5-flash", parallel: 3 }
  anthropic:     { model: "claude-haiku-4-5", parallel: 10 }
  openai:        { model: "gpt-4o-mini", parallel: 10 }
  google:        { model: "gemini-2.5-flash", parallel: 10 }
  openai-compat: { endpoint: "", model: "", parallel: 5 }

review:
  evaluate: diff
  mode: quick
  reasoning_effort: medium
  consensus: 1
  intent_triggers: false
  intent_trigger_budget: 50
  context_window_bytes: auto
  output_reserve_bytes: 2000
  output_max_tokens: 0   # 0 = no cap, both quick + thinking mode. Raise only to cap output-token spend on paid APIs.
  walk_file_cap: 10000
  # remote_rules_auto_pull: false  # set to true to auto-pull missing remote rule caches on validate

enforcement:
  precommit: soft
  validate: hard

context_overrides:
  precommit: { mode: quick, consensus: 1, scope: staged }
  validate:  { mode: thinking, scope: uncommitted }

rules:
  enabled_extra: []
  disabled: []

remote_rules: []

history:
  log_to_file: true
