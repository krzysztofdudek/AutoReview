# Personal AutoReview overrides. Gitignored. Deep-merges over .autoreview/config.yaml.
#
# Use this to:
#   - swap in a different model for a tier on YOUR machine without committing it
#   - lower / raise parallel limits for your network
#   - add / override remote_rules.overrides for rules you handle differently
#
# Example: my repo's heavy tier is set to claude-sonnet, but I've got an Opus subscription
# and want to use it locally:
#
# tiers:
#   heavy:
#     model: claude-opus-4-7
#     reasoning_effort: high
#
# Example: my team set a corp rule to manual; I want it auto on MY machine:
#
# remote_rules:
#   - name: corp-standards
#     overrides:
#       audit-log-on-handlers:
#         type: auto
