name: CI

# Auto-triggers disabled — this workflow is kept as a reference example of
# wiring `npm test` + `npm run coverage` into GitHub Actions for downstream
# users who adopt AutoReview. Runs only when dispatched manually from the
# Actions tab. Flip `push` / `pull_request` back in if you want CI back.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run tests
        run: npm test

  coverage:
    # 90% coverage gate on lines, branches AND functions. Fails the job otherwise.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Configure git identity for e2e scratch repos
        run: |
          git config --global user.email "ci@test"
          git config --global user.name "ci"
      - name: Run coverage gate
        run: npm run coverage
